body:
  text: 高麗沙門義天録海東有本見行録中梵網經義記二卷天台説記二卷端目述疏三卷法藏述疏二卷略疏一卷持犯一卷十重戒序附已上元曉述記二卷下云略説者題目不同耳傳奧述科一卷律燈抄四卷已上遇榮述略疏三卷傳奧述仲希録疏注於經文之下科一卷傳奧述律燈鈔五卷遇榮集應及刪補科三卷會違通理鈔四卷已上志實述述記三卷勝莊述直釋二卷科一卷已上守燈述疏二卷義寂述古迹記二卷宗要一卷已上太賢述疏一卷智詵述自分持犯略記二卷慧雲述或云浮雲居土述待勘記一卷圓勝述義疏一卷但云嶽法師述不見上字注一卷處行述瓔珞本業經疏三卷元曉述地持經義記十卷慧遠述佛遺教經疏二卷疏科一卷已上智圓述助宣記二卷仁嶽述注一卷科一卷統要鈔二卷已上允堪述論疏節要一卷節要科一卷廣宣鈔一卷已上淨源述四分律疏二十卷智首述刪繁補闕行事鈔十二卷道宣述鈔記六卷義威述刪補鈔決四卷或二卷靈崿述行事鈔記五卷或三卷玄本述律鈔科約四卷律鈔義紀五卷已上崇福述輔篇記六卷玄儼述行事鈔集要録十二卷慧則述行事鈔增暉紀二十卷希覺述律鈔義苑記七卷擇悟述律鈔會正説十二卷科六卷允堪述律鈔評集記十四卷科三卷澄淵述律鈔資持記十四卷科三卷元照述開宗記二十卷拾遺鈔一卷已上懷素述開宗記科八卷澄素述開宗記義鏡鈔二十卷行滿述疏五卷靈裕述疏四卷法礪述鈔一卷慧光述拾毗尼要三卷資持記主以為南山所撰近勘此方古本云憬興述興是唐初海東之人廣有著述刪補隨機羯磨二卷入大藏隨機羯磨疏八卷或四卷已上道宣述隨機羯磨記二卷光勝述隨機羯磨疏正源記八卷允堪述羯磨疏一卷法礪述羯磨私記一卷慈藏述羯磨記二卷圓勝述羯磨記一卷一相述羯磨記一卷智明述羯磨記一卷憬興述羯磨疏一卷法源述見行要鈔一卷毗尼見行鈔一卷行事略鈔一卷刪定僧戒本一卷含注戒本三卷或一卷或二卷含注戒本疏八卷或四卷已上道宣述含注戒本疏發輝記八卷注刪補僧戒本三卷已上允堪述注刪補僧戒本科一卷注刪補僧戒本闡宗記三卷已上智肱述比丘尼含注戒本一卷比丘尼鈔六卷已上道宣述比丘尼鈔科二卷允堪述比丘尼鈔五卷玄憚述比丘尼戒本略釋六卷思弘述尼戒略釋科一卷志延述木叉記一卷圓勝述木叉疏一卷木叉緣起一卷教迹一卷已上一相述戒本私記一卷教行述問答義題二卷應評述律鈔音義指歸三卷贊寧述南山讀日禮讚文一卷仁嶽述南山讀日禮讚文一卷允堪述十誦律戒本私記二卷道成述木叉紀一卷慈藏述木叉紀一卷一相述五分律紀一卷一相述律二十二明了論義記五卷真諦述出要律儀綱目章一卷智首述僧尼要事二卷僧璩或云僧述待勘毗尼對要二卷玄惲述毗尼藏中釋名出體一卷應評述戒壇圖經一卷道宣述科一卷闡幽鈔已上法明述科一卷道宗鈔一卷已上允堪述淨心誡觀一卷道宣述科一卷發真鈔三卷已上允堪述釋門章服儀一卷道宣述科一卷翼聖紀一卷已上法明述量處輕重儀一卷道宣述輕重采英記二卷釋門歸敬儀一卷教誡新學比丘行護律儀一卷已上道宣述教誡儀通衍鈔二卷允堪述南山靈感傳二卷道宣述靈感傳通幽鈔二卷允堪述釋門集僧軌度圖經一卷道宣述律部宗要一卷三學論衡五卷衣鉢名義章一卷六念五觀章一卷已上允堪述施食須知一卷仁嶽述律宗行事儀二卷擇其述佛制比丘六物圖一卷元照述五戒觀相文一卷亡名釋門自鏡録三卷懷信述四時禮文一卷道安述慈悲懺法十卷梁武帝述發菩提心戒本三卷大乘懺悔儀四卷近住五戒儀一卷近住八戒儀一卷自誓受戒儀一卷諸雜禮佛文三卷自恣緣一卷釋門應用三卷持課儀一卷已上思孝述
