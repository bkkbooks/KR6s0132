body:
  text: 高麗沙門義天錄海東有本見行錄下大乘起信論釋摩訶衍論十卷龍樹述疏一卷智愷述疏二卷慧遠述疏三卷曇遷述義記一卷疏一卷已上智儼述疏二卷元曉述隨疏補行記二卷題下云隨青山集義記釋海東疏採大原章教江州福願曹溪等文記亡名科一卷題下云起信論依海東疏科文亡名鈔三卷應真述記三卷慧鏡述疏三卷法藏述集釋鈔六卷元朗述疏四卷或三卷或二卷宗密將藏疏注於論文之下隨疏記六卷傳奧述演奧鈔十卷科二卷延後述筆削記六卷科文一卷子述科文一卷淨源重刊疏一卷智榮述疏一卷慧遍述或云曠師述待勘古迹記一卷太賢述注二卷智愷述注二卷法樂述宗要一卷別記一卷大記一卷料簡一卷已上元曉述別記一卷法藏述問答一卷憬興述珠網三卷或四卷捨繁取妙一卷已上緣起述宗要一卷與曉公宗要不同亡名會記一卷亡名一心修證始末圖一卷宗密述釋摩訶衍論通玄鈔四卷通玄科三卷大科一卷已上志福述通贊疏十卷通贊科三卷大科一卷已上守臻述贊玄疏五卷贊玄科三卷大科一卷已上法悟述成唯識論述記二十卷或十卷窺基述了義燈七卷惠沼述演祕鈔七卷智周述義鏡鈔十二卷或六卷清素述義景鈔二十卷或十四卷澹凝述科五卷從式集澹凝刪補疏序鈔一卷從式述詳鏡幽微新鈔十七卷應新鈔科文四卷大科一卷已上詮明述辯玄鈔二十卷科七卷已上義幽述義縕章十卷或五卷空相述疏二十卷或十卷圓測述綱要十三卷道證述要集決明章四卷要集略述十卷已上神雄述疏二十卷玄範述貶量二十五卷憬興述古迹記十卷太賢述開發章四卷或二卷掌中樞要四卷或三卷或二卷已上窺基述義津鈔六卷藏用述集解三卷惠素述義苑鈔三卷悟真述廣述六卷神雄述宗要一卷元曉述別章三卷圓測述要決二卷遁倫述決擇一卷太賢述百法論決頌一卷述記二卷已上窺基述顯要鈔五卷科二卷已上義幽述疏二卷義忠述聚拾鈔十六卷崇璉述鈔十六卷景猷述慧涉刪補金臺義府十五卷科二卷大科一卷已上詮明述綱要略釋一卷智因述疏一卷圓測述總述三卷注一卷已上義寂述記一卷亡名因明論疏三卷窺基述纂要一卷惠沼續義斷一卷二量章一卷已上慧沼述記二卷智周述演密鈔七卷繼倫述鈔八卷雲儼述義樞鈔十二卷或七卷補闕鈔一卷已上敬田述義雄鈔七卷或有九卷之本與此亦有不同澄淨述義曦鈔六卷科二卷惠智述古今鈔補正衡二卷福善述集玄手鈔三卷懷雅述演密手記三卷義深述手鏡二卷惠深述備闕手鏡三卷但云上國沙門達述不見上字或云達瑜伽是略鈔二卷從隱述要略記二卷惠素述逐難略釋一卷本真述備闕略鈔二卷悟真述洞祕研精鈔七卷科三卷元盛述精正鈔八卷科三卷義幽述疏一卷判比量論一卷已上元曉述疏二卷文軌述疏一卷靖邁述古迹記一卷太賢述正理門論過類疏一卷窺基述古迹卷一卷太賢述瑜伽論略纂十六卷劫章頌一卷已上窺基述疏四十卷智周述義演四十卷清素述科十四卷中科一卷大科一卷澄淨述心鏡記四卷惠潭述戒地品義記三卷科一卷大科一卷鈔三卷已上志隱述疏二十卷惠景述疏二十四卷遁倫述疏十卷劫彼羅義章一卷已上神泰述疏十七卷玄一述疏十卷憬興述鈔十卷本立述羽足鈔五卷極太述古迹記四卷太賢述文迹一卷惠景述五蘊論古迹記一卷顯揚論古迹記二卷或一卷已上太賢述攝大乘論世親釋論疏十六卷或八卷法常述或云道證述待勘世親釋論略記四卷元曉述世親釋論古迹記一卷太賢述無性釋論疏四卷智儼述無性釋論疏十四卷神廓述無性釋論古迹記一卷太賢述義章十卷道基述略章四卷法常述名教一卷亡名雜集論疏十六卷玄範述古迹記四卷太賢述中邊論疏四卷元曉述料簡一卷玄一述古迹記一卷太賢述唯識二十論古迹記一卷成業論古迹記一卷觀所緣論古迹記一卷已上太賢述掌珍論宗要一卷元曉述古迹記一卷太賢述法界無差別論疏一卷法藏述中觀論疏一卷曇影述義鏡二卷玄濟述三十六門勢鈔一卷傳燈述義疏十一卷亡名私記一卷寶門述百論義疏二卷亡名私記二卷亡名廣百論宗要一卷元曉述古迹記一卷太賢述十二門論疏一卷法藏述三論宗要一卷中百門是元曉述大智度論疏五卷但云衍法師述不見上字應是曇衍待勘十地經論義記十四卷慧遠述法華論疏二卷吉藏述注三卷亡名集解鈔二卷神雄述遺教經論住法記一卷科一卷已上元照述阿毘曇論義章十卷或五卷鈔一卷已上道基述大毘婆沙論鈔九卷玄則述鈔十卷極太述鈔六卷本立述鈔十一卷本義述別用鈔決疑一卷已上本立述釋名章一卷亡名科文一卷亡名俱舍論記二十卷普光述疏十二卷法寶述頌疏六卷或十卷圓暉述頌疏義府鈔二十卷或十卷乾廣述或云崇廣待勘序鈔一卷亡名或云行滿述待勘頌疏鈔八卷常真述頌疏科一卷亡名章門四卷承真述五位折玄記二卷敬雲述法源章一卷普光述私記二卷別用鈔二卷攬要二卷已上本立述鈔三卷憬興述鈔二卷雲因述地位章三卷亡名或云立許述待勘料簡一卷智琳述四果章一卷永龍述義策一卷本義述順正理論述記五卷元裕述鈔二卷極太述藏阿毘曇心論疏一卷智藏述異部宗輪論疏一卷窺基述肇論一卷僧肇述註一卷亡名或云叡法師注待勘夾科二卷元康科疏三卷元康述注三卷光瑤注注三卷瑤等三注注三卷好直注中吳集解三卷中吳集解科一卷令摸鈔二卷已上淨源述寶藏論一卷僧肇述注三卷法滋注十四科一卷道生述注一卷亡名九識章三卷真諦述法界次第三卷天台述大乘義記二十八卷或十四卷慧遠述法苑義林六卷或七卷或十卷窺基述決擇鈔三卷智周述集玄鈔三卷悟真述釋名章二卷或一卷大乘心路章二卷廣釋本母頌三卷大乘一味章一卷已上太賢述記三卷科見述二諦章一卷亡名大乘取義章十卷或五卷景育述十門和諍論二卷二諦章一卷已上元曉述諸法無諍門二卷慧思述摩訶止觀十卷天台述科六卷弘決十五卷或十一卷或三十卷開合而已搜要記十卷已上湛然述刪定止觀六卷梁肅述止觀義例一卷止觀大意一卷已上湛然述諸宗止觀三卷科一卷已上道弼述小止觀一卷觀心論一卷已上天台說疏三卷灌頂述禪波羅蜜十卷禪門口決一卷六妙門禪法一卷方等行法一卷覺義三昧一卷四念處四卷般若玄論一卷四教義四卷或有十二卷本開合而已略明開矇初學坐禪止觀要門三卷或一卷圓教六即一卷已上天台述八教大意一卷國清百錄五卷已上灌頂述四教儀一卷諦觀述科一卷仁岳述科一卷集解三卷已上從義述講義三卷從陳述問答一卷亡名地位集解一卷亡名別理隨緣二十問一卷融會章附智禮述指濫一卷繼齊述義學雜編六卷仁岳述經體章一卷尚賢述圓事理該一卷科一卷元淨述圓教解行集要一卷惠才述天台法數十卷智親編天台文類十卷如吉編類集口義十三卷繼忠錄原人論一卷宗密述發微錄一卷科一卷淨源述明因救止遺身論一卷救止遺身後論一卷已上晁逈述調伏我心論一卷安身事心論一卷求道譬喻論一卷初章一卷已上元曉述雜記九卷遁倫述法門名相集一卷李師正述入道禪門祕要一卷智儼述入道出世要法二卷或一卷三階集錄四卷已上信行述念佛三昧寶王論三卷飛錫述明了真佛論一卷敬田述疏一卷亡名直指淨土決疑集三卷王古集往生淨土傳三卷戒珠集隨願往生集二十卷非濁集護法沙門法琳別傳三卷彥琮述續開元釋教錄三卷詮曉集舊名詮明法苑珠林一百卷道世集一切經音義一百卷惠琳述續一切經音義十卷希麟述大宋高僧傳三十卷僧史略三卷已上贊寧撰北山錄十卷神清述輔教篇三卷契嵩述釋氏會要四十卷仁贊述右繞行道正儀章一卷允堪述浮圖右繞書四卷陳舜喻述復右旋行道儀一卷仁岳述右繞行道破邪現正儀一卷靈鑑述安元二年丙申六月四日以仁和寺華嚴院法橋景雅御本書寫了明空寬永二十有一年七月日以栂尾法鼓臺之本寫于禪堂院陳簡蠹編多失文畫或推而補苴焉或疑而闕如焉且又此錄本未為盡矣本朝見行之章疏遺餘者惟多冀俟明眼博覽之考訂廣行于世是余護法之微志也安樂壽院沙門運敞元祿六年歲次癸酉鶉月陽精洛下書林井上忠兵衛壽梓
