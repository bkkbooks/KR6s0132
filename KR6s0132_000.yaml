front:
  text: 新編教藏總錄流衍序夫明月之珠焰光之璧納櫃而弗庸則有那益乎哉宓惟義天姓王氏高麗國文宗仁孝王第四之子也出家封祐世僧統元祐初入中華而上表請傳賢首教迺勅而見許肇往四明事智師慈辨而受天台教觀趨至靈芝拜大智元照而學律藏從晉水淨源而聞賢首宗乘亦遭圓照宗本禪師而問宗義大旨曲如僧傳等厥雷聲震于支那動三韓矣五千四十八卷歠一口而不足亦復搜索章疏教迹歷二十年而隨所獲編次以作三卷目新編諸宗教藏總錄也斯錄漸于本朝垂于六百載虛藏叢林而使為蟲蠹之宅頃日井上氏直屈起鏤梓以欲流衍天下余於茲甜其志而俱出腕頭之力的策此之懈云詎不急務諸時元祿歲次癸酉蒲月既望毘盧正宗西湖比丘白玄天龍書于三學山草堂新編諸宗教藏總錄序漢明夢感之後葉書繼至翻譯流通者無代無之而及貞觀經論大備繇是西聖之教霈然莫禦也自聶道真道安至于明佺宣律師各著目錄謂之晉錄魏錄等然於同本異出舊目新名多惑異途真偽相亂或一經為兩本或支品為別翻四十餘家紛然久矣開元中始有大法師厥號智昇刊落訛謬刪簡重複總成一書曰開元釋教錄凡二十卷最為精要議者以為經法之譜無出昇之右矣住持遺教莫大焉予甞竊謂經論雖備而章疏或廢則流衍無由矣輒効昇公護法之志搜訪教迹以為己任孜孜不捨僅二十載于茲矣今以所得新舊製撰諸宗義章不敢私祕敘而出之後有所獲亦欲隨而錄之脫或將來編次函帙與三藏正文垂之無窮則吾願畢矣時後高麗十三葉在宥之八年歲次庚午八月初八日海東傳華嚴大教沙門義天敘
